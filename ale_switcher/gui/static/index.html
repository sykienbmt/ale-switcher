<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AleSwitcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tailwind.min.css">
  <script src="js/alpine.min.js" defer></script>
  <style>
    html, body { background-color: #FAFBFC; overscroll-behavior: none; height: 100%; overflow: hidden; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    [x-cloak] { display: none !important; }
    .animate-fade-in { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
    @keyframes pulse { 50% { opacity: .5; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    * { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 h-screen flex flex-col font-sans antialiased" x-data="app()" x-init="init()">

  <!-- ============ NAVBAR ============ -->
  <nav class="sticky top-0 z-50 bg-white border-b border-gray-100 shadow-sm">
    <div class="max-w-7xl mx-auto px-5">
      <div class="flex items-center h-12 gap-2">
        <!-- Logo -->
        <div class="flex items-center gap-2 shrink-0">
          <img src="img/icon.png" alt="AleSwitcher" style="width:24px;height:24px;border-radius:6px;" class="shadow-sm shrink-0">
          <span class="text-sm font-bold text-gray-900 tracking-tight">AleSwitcher</span>
        </div>

        <div class="flex-1"></div>

        <!-- Active account pill -->
        <div x-show="currentAccount" x-cloak
             class="flex items-center gap-1.5 px-2.5 py-1 bg-emerald-50 border border-emerald-200 rounded-lg">
          <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse shrink-0"></span>
          <span class="text-xs font-medium text-emerald-700 truncate max-w-[160px]" x-text="currentAccount?.nickname || currentAccount?.email || ''"></span>
        </div>

        <!-- Smart Switch -->
        <button
          @click="switchOptimal()"
          :disabled="loading"
          class="px-3 py-1.5 bg-indigo-500 text-white text-xs font-medium rounded-lg hover:bg-indigo-600 transition-colors flex items-center gap-1.5 shadow-sm cursor-pointer disabled:opacity-70 disabled:cursor-not-allowed"
          title="Auto-select best account">
          <svg class="w-3.5 h-3.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
          <span class="hidden sm:inline">Smart Switch</span>
        </button>

        <!-- Add Account -->
        <button @click="loginOAuth()"
                :disabled="loading"
                class="px-3 py-1.5 bg-blue-500 text-white text-xs font-medium rounded-lg hover:bg-blue-600 transition-colors flex items-center gap-1.5 shadow-sm cursor-pointer disabled:opacity-70 disabled:cursor-not-allowed">
          <svg class="w-3.5 h-3.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
          <span class="hidden sm:inline">Add Account</span>
        </button>

        <!-- Refresh -->
        <button
          @click="refreshAll()"
          :disabled="loading"
          class="p-1.5 text-gray-500 rounded-lg hover:bg-gray-100 transition-colors cursor-pointer disabled:opacity-70 disabled:cursor-not-allowed"
          title="Refresh all data">
          <svg class="w-4 h-4" :class="loading && 'animate-spin'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- ============ MAIN CONTENT ============ -->
  <main class="flex-1 overflow-y-auto overflow-x-hidden">
    <div class="max-w-7xl mx-auto px-5 py-4">

      <!-- Stats + Search -->
      <div class="flex items-center gap-3 mb-3">
        <div class="flex items-center gap-3 text-xs text-gray-500 shrink-0">
          <span><span class="font-bold text-gray-800" x-text="accounts.length"></span> accounts</span>
          <span class="text-gray-300">|</span>
          <span class="flex items-center gap-1">
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 inline-block"></span>
            <span class="font-medium text-gray-700 truncate max-w-[120px]" x-text="currentAccount?.nickname || currentAccount?.email?.split('@')[0] || 'None'"></span>
          </span>
        </div>

        <div class="relative flex-1 max-w-xs">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
          </svg>
          <input type="text" placeholder="Search accounts..."
                 x-model="searchQuery"
                 class="w-full pl-9 pr-3 py-1.5 bg-white text-sm text-gray-900 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent placeholder:text-gray-400">
        </div>

        <!-- Smart switch result -->
        <div x-show="optimalResult" x-cloak x-transition
             class="flex-1 text-xs text-gray-600 bg-indigo-50 rounded-lg px-3 py-1.5 font-mono border border-indigo-100 truncate">
          <span x-text="optimalResult"></span>
        </div>
      </div>

      <!-- Account Cards Grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 animate-fade-in">
        <template x-for="acc in filteredAccounts" :key="acc.uuid">
          <div class="flex flex-col p-3 rounded-xl border transition-all hover:shadow-md"
               :class="currentAccount?.uuid === acc.uuid
                 ? 'bg-blue-50 border-blue-200 shadow-sm'
                 : 'bg-white border-gray-100'">

            <!-- Header: name + badges + Switch button -->
            <div class="flex items-start justify-between gap-2 mb-3">
              <div class="flex-1 min-w-0">
                <h3 class="font-semibold text-sm truncate mb-1"
                    :class="currentAccount?.uuid === acc.uuid ? 'text-blue-700' : 'text-gray-900'"
                    x-text="acc.nickname || acc.display_name || acc.email"></h3>
                <div class="flex items-center gap-1 flex-wrap">
                  <template x-if="currentAccount?.uuid === acc.uuid">
                    <span class="px-1.5 py-0.5 rounded bg-blue-100 text-blue-700 text-[10px] font-bold border border-blue-200">ACTIVE</span>
                  </template>
                  <template x-if="acc.has_claude_max">
                    <span class="px-1.5 py-0.5 rounded bg-gradient-to-r from-purple-600 to-pink-600 text-white text-[10px] font-bold">MAX</span>
                  </template>
                  <template x-if="acc.has_claude_pro && !acc.has_claude_max">
                    <span class="px-1.5 py-0.5 rounded bg-gradient-to-r from-blue-600 to-indigo-600 text-white text-[10px] font-bold">PRO</span>
                  </template>
                  <template x-if="acc.org_uuid && !acc.has_claude_pro && !acc.has_claude_max">
                    <span class="px-1.5 py-0.5 rounded bg-gradient-to-r from-teal-600 to-cyan-600 text-white text-[10px] font-bold"
                          x-text="acc.org_type === 'enterprise' ? 'ENTERPRISE' : 'TEAM'"></span>
                  </template>
                  <template x-if="!acc.org_uuid && !acc.has_claude_pro && !acc.has_claude_max">
                    <span class="px-1.5 py-0.5 rounded bg-gray-100 text-gray-500 text-[10px] font-bold border border-gray-200">FREE</span>
                  </template>
                </div>
              </div>

              <!-- Switch button - prominent top-right -->
              <button
                @click="switchTo(acc)"
                :disabled="currentAccount?.uuid === acc.uuid || switchingId === acc.uuid"
                :class="currentAccount?.uuid === acc.uuid
                  ? 'bg-blue-100 text-blue-400 cursor-not-allowed'
                  : switchingId === acc.uuid
                    ? 'bg-blue-100 text-blue-500 cursor-not-allowed'
                    : 'bg-gray-900 text-white hover:bg-gray-700 cursor-pointer shadow-sm'"
                class="shrink-0 px-3 py-1.5 rounded-lg text-xs font-semibold transition-all flex items-center gap-1.5">
                <svg class="w-3 h-3" :class="switchingId === acc.uuid && 'animate-spin'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
                </svg>
                <span x-text="currentAccount?.uuid === acc.uuid ? 'Active' : switchingId === acc.uuid ? '...' : 'Switch'"></span>
              </button>
            </div>

            <!-- Usage bars -->
            <div class="flex-1 space-y-2 mb-2">
              <template x-for="bar in getUsageBars(acc)" :key="bar.label">
                <div>
                  <div class="flex justify-between items-center text-[10px] mb-0.5">
                    <span class="text-gray-500 font-medium" x-text="bar.label"></span>
                    <span class="font-mono font-bold" :class="bar.colorClass" x-text="bar.value + '%'"></span>
                  </div>
                  <div class="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                    <div class="h-full rounded-full transition-all duration-700"
                         :class="bar.barClass"
                         :style="'width: ' + bar.value + '%'"></div>
                  </div>
                </div>
              </template>
              <p x-show="acc.usage_error" class="text-[10px] text-red-500 font-mono truncate" x-text="acc.usage_error"></p>
            </div>

            <!-- Footer: email + refresh/info icons -->
            <div class="flex items-center justify-between pt-2 border-t border-gray-100">
              <span class="text-[10px] text-gray-400 truncate flex-1 min-w-0 font-mono" x-text="acc.email"></span>
              <div class="flex items-center gap-0.5 shrink-0 ml-1">
                <button
                  @click="forceRefresh(acc)"
                  :disabled="refreshingIds.has(acc.uuid)"
                  :class="refreshingIds.has(acc.uuid) ? 'text-emerald-500 cursor-not-allowed' : 'text-gray-300 hover:text-emerald-500 cursor-pointer'"
                  class="p-1 rounded transition-all"
                  title="Refresh token">
                  <svg class="w-3 h-3" :class="refreshingIds.has(acc.uuid) && 'animate-spin'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                  </svg>
                </button>
                <button
                  @click="showAccountDetails(acc)"
                  class="p-1 text-gray-300 hover:text-sky-500 rounded transition-all cursor-pointer"
                  title="Account details">
                  <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </template>
      </div>

      <!-- Empty states -->
      <template x-if="filteredAccounts.length === 0 && accounts.length > 0">
        <div class="bg-white rounded-2xl p-12 shadow-sm border border-gray-100 text-center mt-4">
          <p class="text-gray-400 text-sm">No accounts match your search</p>
        </div>
      </template>
      <template x-if="accounts.length === 0 && !loading">
        <div class="bg-white rounded-2xl p-12 shadow-sm border border-gray-100 text-center mt-4">
          <svg class="w-10 h-10 text-gray-300 mx-auto mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/>
          </svg>
          <p class="text-gray-400 mb-3">No accounts yet</p>
          <button @click="loginOAuth()"
                  class="px-4 py-2 bg-blue-500 text-white text-sm font-medium rounded-lg hover:bg-blue-600 transition-colors cursor-pointer">
            Add Account
          </button>
        </div>
      </template>

      <!-- Loading skeleton -->
      <template x-if="accounts.length === 0 && loading">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 mt-1">
          <template x-for="i in [1,2,3,4]" :key="i">
            <div class="bg-white rounded-xl border border-gray-100 p-3 animate-pulse">
              <div class="flex justify-between mb-3">
                <div class="space-y-1.5 flex-1">
                  <div class="h-3.5 bg-gray-100 rounded w-3/4"></div>
                  <div class="h-2.5 bg-gray-100 rounded w-1/3"></div>
                </div>
                <div class="h-7 w-16 bg-gray-100 rounded-lg"></div>
              </div>
              <div class="space-y-2">
                <div class="h-2 bg-gray-100 rounded-full"></div>
                <div class="h-2 bg-gray-100 rounded-full"></div>
              </div>
            </div>
          </template>
        </div>
      </template>

    </div>
  </main>

  <!-- ============ ACCOUNT DETAIL MODAL ============ -->
  <div x-show="detailAccount" x-cloak
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
       class="fixed inset-0 z-50 flex items-center justify-center bg-black/30 backdrop-blur-sm"
       @click.self="detailAccount = null" @keydown.escape.window="detailAccount = null">
    <div class="bg-white rounded-2xl shadow-2xl border border-gray-200 w-full max-w-md mx-4 overflow-hidden" x-show="detailAccount" x-transition>
      <div class="p-5">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-base font-semibold text-gray-900">Account Details</h3>
          <button @click="detailAccount = null" class="p-1 text-gray-400 hover:text-gray-600 rounded-lg hover:bg-gray-100 transition-colors cursor-pointer">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <template x-if="detailAccount">
          <div class="space-y-3">
            <div class="flex items-center gap-2 text-sm">
              <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
              <span class="font-medium text-gray-700" x-text="detailAccount?.email"></span>
            </div>
            <div class="flex items-center gap-2 text-sm" x-show="detailAccount?.nickname">
              <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
              <span class="text-gray-600" x-text="detailAccount?.nickname"></span>
            </div>
            <div class="flex items-center gap-2 text-sm">
              <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
              <span class="text-gray-600">Tier: <span class="font-mono" x-text="detailAccount?.rate_limit_tier || '-'"></span></span>
            </div>
            <div class="flex items-center gap-2 text-sm">
              <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg>
              <span class="text-gray-600">
                <template x-if="detailAccount?.has_claude_max"><span class="text-purple-600 font-bold">MAX</span></template>
                <template x-if="detailAccount?.has_claude_pro && !detailAccount?.has_claude_max"><span class="text-blue-600 font-bold">PRO</span></template>
                <template x-if="!detailAccount?.has_claude_pro && !detailAccount?.has_claude_max"><span class="text-gray-500">FREE</span></template>
              </span>
            </div>
            <div class="pt-2 space-y-2">
              <template x-for="bar in getUsageBars(detailAccount)" :key="bar.label">
                <div>
                  <div class="flex justify-between items-center text-[11px] mb-1">
                    <span class="text-gray-500 font-medium" x-text="bar.label"></span>
                    <span class="font-mono font-bold" :class="bar.colorClass" x-text="bar.value + '%'"></span>
                  </div>
                  <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
                    <div class="h-full rounded-full transition-all duration-700" :class="bar.barClass" :style="'width: ' + bar.value + '%'"></div>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- ============ TOAST ============ -->
  <div x-show="toast.show" x-cloak
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 translate-y-2"
       class="fixed bottom-6 right-6 z-[100] max-w-sm rounded-xl shadow-2xl px-4 py-3 text-sm text-white font-medium flex items-center gap-2"
       :class="toast.type === 'error' ? 'bg-red-600' : toast.type === 'success' ? 'bg-emerald-600' : toast.type === 'warning' ? 'bg-amber-500' : 'bg-blue-600'">
    <template x-if="toast.type === 'success'">
      <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    </template>
    <template x-if="toast.type === 'error'">
      <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>
    </template>
    <template x-if="toast.type === 'warning'">
      <svg class="w-4 h-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg>
    </template>
    <p x-text="toast.message"></p>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
