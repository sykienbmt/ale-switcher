name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pyinstaller-hooks-contrib

      - name: Sync version to installer
        run: |
          $ver = python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])"
          (Get-Content build/installer.iss) -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$ver`"" | Set-Content build/installer.iss
        shell: pwsh

      - name: Build exe
        run: python build/build.py

      - name: Build installer
        run: iscc build/installer.iss

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AleSwitcher-Windows
          path: |
            dist/AleSwitcher-*-Setup.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pyinstaller-hooks-contrib
          pip install pyobjc-core pyobjc-framework-Cocoa pyobjc-framework-WebKit

      - name: Create icns icon
        run: |
          mkdir -p build/rsrc
          mkdir -p icon.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size ale_switcher/icon.png --out icon.iconset/icon_${size}x${size}.png 2>/dev/null || true
            double=$((size * 2))
            sips -z $double $double ale_switcher/icon.png --out icon.iconset/icon_${size}x${size}@2x.png 2>/dev/null || true
          done
          iconutil -c icns icon.iconset -o build/rsrc/icon.icns 2>/dev/null || true

      - name: Build app
        run: python build/build.py

      - name: Ad-hoc code sign
        run: |
          codesign --force --deep --sign - dist/AleSwitcher.app

      - name: Create DMG
        run: |
          hdiutil create -volname AleSwitcher \
            -srcfolder dist/AleSwitcher.app \
            -ov -format UDZO \
            dist/AleSwitcher-$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])").dmg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AleSwitcher-macOS
          path: dist/AleSwitcher-*.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
